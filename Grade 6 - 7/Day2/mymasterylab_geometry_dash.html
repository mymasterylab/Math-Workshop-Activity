<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyMasteryLab — Geometry Dash</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Rubik:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0614;
    --panel:#160f28;
    --panel2:#1d1436;
    --cyan:#00e5ff;
    --pink:#ff2e97;
    --yellow:#ffe600;
    --green:#39ff14;
    --purple:#b026ff;
    --ink:#eef0ff;
    --mute:#8d86ad;
    --accent:#00e5ff;
    --display:'Orbitron', sans-serif;
    --body:'Rubik', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;min-height:100%;}
  body{
    background:
      radial-gradient(ellipse at 20% 0%, rgba(176,38,255,.18), transparent 55%),
      radial-gradient(ellipse at 85% 15%, rgba(0,229,255,.14), transparent 50%),
      var(--void);
    color:var(--ink);
    font-family:var(--body);
    overflow-x:hidden;
    position:relative;
    min-height:100vh;
  }

  /* floating neon geometry (ambient background only) */
  .shape-field{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;}
  .fshape{position:absolute;opacity:.16;animation:floaty linear infinite;}
  @keyframes floaty{
    0%{transform:translateY(0) rotate(0deg);}
    100%{transform:translateY(-120vh) rotate(360deg);}
  }

  /* ambient scrolling neon grid floor (background flavor only) */
  .ground{
    position:fixed;left:0;right:0;bottom:0;height:70px;z-index:1;
    background:
      linear-gradient(transparent 0%, rgba(0,229,255,.04) 100%),
      repeating-linear-gradient(90deg, rgba(0,229,255,.22) 0 2px, transparent 2px 62px);
    animation:scrollGround 2.4s linear infinite;
    border-top:1px solid rgba(0,229,255,.35);
    opacity:.5;
  }
  @keyframes scrollGround{ from{background-position:0 0,0 0;} to{background-position:0 0,-62px 0;} }

  body.shake{animation:shake .4s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);} 40%{transform:translateX(7px);}
    60%{transform:translateX(-5px);} 80%{transform:translateX(4px);}
  }
  .flash-red{position:fixed;inset:0;background:rgba(255,20,60,.22);z-index:3;pointer-events:none;
    opacity:0;transition:opacity .1s ease;}
  .flash-red.show{opacity:1;}

  .particle{position:fixed;z-index:8;border-radius:3px;pointer-events:none;}

  .tip-bubble{
    position:fixed;z-index:9;max-width:230px;background:var(--panel2);
    border:2px solid var(--pink);border-radius:12px;padding:10px 12px;
    font-family:var(--body);font-size:.82rem;color:var(--ink);
    box-shadow:0 0 20px rgba(255,46,151,.5);
    opacity:0;transform:scale(.8);transition:opacity .25s ease, transform .25s ease;
    pointer-events:none;
  }
  .tip-bubble.show{opacity:1;transform:scale(1);}
  .tip-bubble::before{content:"🤖 Dash says: ";font-weight:700;color:var(--pink);}

  .wrap{position:relative;z-index:3;max-width:760px;margin:0 auto;padding:26px 18px 60px;}

  header{text-align:center;margin-bottom:14px;}
  .brand{
    font-family:var(--display);font-weight:900;letter-spacing:2px;font-size:1.9rem;
    background:linear-gradient(90deg,var(--cyan),var(--pink));-webkit-background-clip:text;
    background-clip:text;color:transparent;margin:0;
  }
  .brand small{display:block;font-family:var(--body);font-size:.68rem;letter-spacing:5px;
    color:var(--mute);text-transform:uppercase;margin-top:4px;font-weight:600;}
  .tagline{font-size:.92rem;color:var(--mute);margin-top:8px;}

  .badge-tray{display:flex;justify-content:center;gap:10px;margin:18px 0 6px;flex-wrap:wrap;}
  .badge-slot{
    width:52px;height:52px;border-radius:50%;border:2px solid #2c2450;
    display:flex;align-items:center;justify-content:center;font-size:1.4rem;
    background:var(--panel);transition:all .4s ease;
  }
  .badge-slot.earned{
    border-color:var(--yellow);box-shadow:0 0 16px rgba(255,230,0,.6);
    background:radial-gradient(circle,#2b2410,var(--panel));
  }

  .card{
    background:linear-gradient(180deg,var(--panel),#100a20);
    border:1px solid #2c2450;border-radius:16px;padding:24px;margin-top:16px;
    box-shadow:0 20px 50px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.02) inset;
    position:relative;
  }

  /* ---------- HURDLE TRACK ---------- */
  .track-wrap{
    position:relative;height:132px;margin:6px 0 18px;border-radius:12px;overflow:hidden;
    background:
      linear-gradient(180deg, rgba(255,255,255,.02), transparent 60%),
      repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 1px, transparent 1px 34px),
      #0d0820;
    border:1px solid #2c2450;
  }
  .track-floor{
    position:absolute;left:0;right:0;bottom:14px;height:2px;
    background:var(--accent);box-shadow:0 0 10px var(--accent);
    transition:background .4s ease, box-shadow .4s ease;
  }
  .track-finish{
    position:absolute;bottom:14px;right:4%;width:4px;height:34px;
    background:repeating-linear-gradient(180deg,#fff 0 6px,#333 6px 12px);
    opacity:.5;
  }
  .track-obstacle{
    position:absolute;bottom:16px;left:55%;transform:translateX(-50%);
    display:flex;align-items:flex-end;justify-content:center;
    filter:drop-shadow(0 0 8px currentColor);
  }
  .track-cube{
    position:absolute;bottom:16px;left:6%;width:38px;height:38px;
    border-radius:9px;background:linear-gradient(135deg,var(--accent),#fff2);
    box-shadow:0 0 14px var(--accent), inset 0 0 8px rgba(255,255,255,.4);
    transition:background .4s ease, box-shadow .4s ease;
  }
  .track-cube::before,.track-cube::after{
    content:"";position:absolute;top:12px;width:6px;height:6px;background:var(--void);border-radius:50%;
  }
  .track-cube::before{left:8px;} .track-cube::after{right:8px;}
  .track-label{
    position:absolute;top:8px;left:10px;font-family:var(--mono);font-size:.65rem;
    color:var(--mute);letter-spacing:1px;text-transform:uppercase;
  }

  .percent-bar{height:12px;border-radius:8px;background:#140c26;overflow:hidden;
    margin:16px 0 4px;border:1px solid #2c2450;position:relative;}
  .percent-fill{height:100%;background:linear-gradient(90deg,var(--accent),#fff);transition:width .5s cubic-bezier(.4,0,.2,1);
    box-shadow:0 0 10px var(--accent);}
  .percent-label{text-align:right;font-family:var(--mono);font-size:.7rem;color:var(--mute);margin-top:4px;}

  h2.level-title{
    font-family:var(--display);color:var(--accent);font-size:1.5rem;letter-spacing:1px;
    margin:0 0 6px;text-shadow:0 0 12px rgba(0,229,255,.3);
  }
  .level-desc{color:var(--mute);font-size:.9rem;margin-bottom:14px;}

  .grade-toggle{display:flex;gap:12px;justify-content:center;margin:20px 0;flex-wrap:wrap;}
  .grade-btn{
    flex:1 1 160px;max-width:230px;background:var(--panel2);border:2px solid #2c2450;
    color:var(--ink);padding:18px 12px;border-radius:14px;cursor:pointer;
    font-family:var(--body);font-weight:700;font-size:1rem;transition:all .2s ease;
  }
  .grade-btn:hover{border-color:var(--accent);transform:translateY(-3px) scale(1.02);
    box-shadow:0 8px 24px rgba(0,229,255,.25);}
  .grade-btn small{display:block;color:var(--mute);font-weight:400;font-size:.78rem;margin-top:5px;}

  .primary-btn{
    background:linear-gradient(135deg,var(--accent),var(--pink));color:#0a0614;border:none;
    padding:14px 24px;border-radius:10px;font-family:var(--display);font-weight:700;
    font-size:.95rem;letter-spacing:1px;cursor:pointer;transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 6px 20px rgba(0,229,255,.35);
  }
  .primary-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 10px 26px rgba(0,229,255,.5);}
  .primary-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

  .ghost-btn{
    background:transparent;border:1px solid #3a3468;color:var(--mute);
    padding:10px 16px;border-radius:8px;font-family:var(--body);cursor:pointer;font-size:.85rem;
  }
  .ghost-btn:hover{border-color:var(--accent);color:var(--accent);}

  .center{text-align:center;}
  .q-meta{display:flex;justify-content:space-between;color:var(--mute);font-size:.75rem;
    font-family:var(--mono);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase;}
  .q-tag{color:var(--green);}
  .q-tag.g7{color:var(--pink);}

  .question-box{
    background:#0d0820;border:1px solid #2c2450;border-radius:12px;
    padding:20px;margin:10px 0;font-family:var(--body);font-size:1.08rem;font-weight:500;
    color:var(--ink);text-align:center;line-height:1.5;
  }

  .answer-row{display:flex;gap:10px;margin-top:14px;}
  input[type=text]{
    flex:1;background:#0d0820;border:2px solid #2c2450;border-radius:10px;
    padding:13px 14px;color:var(--ink);font-family:var(--mono);font-size:1rem;
    outline:none;transition:border-color .2s ease;
  }
  input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.15);}
  input[type=text]:disabled{opacity:.5;}

  .feedback{margin-top:12px;font-size:.9rem;min-height:22px;font-weight:600;}
  .feedback.good{color:var(--green);}
  .feedback.bad{color:var(--pink);}

  .code-gate{text-align:center;margin-top:8px;}
  .code-gate input{
    width:220px;text-align:center;letter-spacing:3px;text-transform:uppercase;
    font-weight:700;margin:14px auto;display:block;
  }

  .badge-reveal{text-align:center;}
  .badge-reveal .big-badge{
    font-size:5rem;margin:10px 0;filter:drop-shadow(0 0 24px rgba(255,230,0,.6));
    animation:spinIn .7s ease-out;
  }
  @keyframes spinIn{0%{transform:scale(0) rotate(-180deg);opacity:0;}100%{transform:scale(1) rotate(0deg);opacity:1;}}
  .badge-reveal h3{font-family:var(--display);color:var(--yellow);font-size:1.5rem;margin:6px 0 2px;}
  .badge-reveal p{color:var(--mute);font-size:.9rem;margin-top:0;}

  .doors-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:18px 0;}
  .door{
    aspect-ratio:2/3;border-radius:10px 10px 4px 4px;border:2px solid var(--purple);
    background:linear-gradient(180deg,#241a44,#150e2a);display:flex;flex-direction:column;
    align-items:center;justify-content:center;cursor:pointer;transition:all .2s ease;
    font-family:var(--display);font-size:1.4rem;color:var(--ink);position:relative;
  }
  .door:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(176,38,255,.4);}
  .door.done{border-color:var(--green);background:linear-gradient(180deg,#123322,#0d1f16);color:var(--green);}
  .door .door-icon{font-size:1.6rem;margin-bottom:4px;}

  .victory{text-align:center;}
  .victory h1{font-family:var(--display);font-size:2.2rem;
    background:linear-gradient(90deg,var(--yellow),var(--pink));-webkit-background-clip:text;background-clip:text;color:transparent;
    margin-bottom:6px;}
  .leaderboard{margin-top:20px;text-align:left;border:1px solid #2c2450;border-radius:12px;overflow:hidden;}
  .lb-row{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:.9rem;
    border-bottom:1px solid #241d40;background:var(--panel2);}
  .lb-row:nth-child(even){background:var(--panel);}
  .lb-rank{width:28px;font-family:var(--mono);color:var(--mute);}
  .lb-name{flex:1;font-weight:600;}
  .lb-time{font-family:var(--mono);color:var(--accent);}
  .lb-note{font-size:.75rem;color:var(--mute);margin-top:8px;text-align:center;}

  .name-gate input{width:80%;text-align:center;font-family:var(--display);font-size:1.1rem;
    color:var(--yellow);background:transparent;border:none;border-bottom:2px dashed var(--yellow);
    margin:14px auto;display:block;padding:8px;}
  .name-gate input:focus{outline:none;}

  footer.credit{text-align:center;color:#4a466e;font-size:.75rem;margin-top:26px;}

  @media (prefers-reduced-motion: reduce){
    .ground{animation:none;} .fshape{animation:none;display:none;}
  }
  @media (max-width:480px){
    .brand{font-size:1.5rem;}
    .doors-grid{grid-template-columns:repeat(5,1fr);gap:6px;}
    .door{font-size:1rem;}
    .track-wrap{height:110px;}
  }
</style>
</head>
<body>

<div class="flash-red" id="flashRed"></div>
<div class="shape-field" id="shapeField"></div>
<div class="ground"></div>
<div class="tip-bubble" id="tipBubble"></div>

<div class="wrap">
  <header>
    <h1 class="brand">MyMasteryLab<small>Geometry Dash</small></h1>
    <div class="tagline">🔺 Run. Jump the hurdle. Solve. Escape with every badge. 🔺</div>
  </header>

  <div class="badge-tray" id="badgeTray"></div>

  <div class="card" id="app"></div>

  <footer class="credit">MyMasteryLab · Grades 6–7 Geometry Adventure · Ask your teacher for badge codes</footer>
</div>

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pick5(level){
  const pool = state.grade===7 ? level.g7 : level.g6;
  return shuffle(pool).slice(0,5).map(x=>({...x, isG7: state.grade===7}));

/* ============================================================
   AUDIO (generated — no external files)
============================================================ */
let actx=null;
function audioCtx(){ if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function tone(freq,start,dur,type='sine',peak=0.18){
  const ctx=audioCtx(); const osc=ctx.createOscillator(); const gain=ctx.createGain();
  osc.type=type; osc.frequency.setValueAtTime(freq, ctx.currentTime+start);
  gain.gain.setValueAtTime(0, ctx.currentTime+start);
  gain.gain.linearRampToValueAtTime(peak, ctx.currentTime+start+0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+start+dur);
  osc.connect(gain).connect(ctx.destination);
  osc.start(ctx.currentTime+start); osc.stop(ctx.currentTime+start+dur+0.05);
}
function playSuccess(){ tone(880,0,0.1,'square',0.12); tone(1174.66,0.09,0.12,'square',0.14); tone(1567.98,0.19,0.22,'square',0.16); }
function playBadge(){ [523.25,659.25,783.99,1046.5,1318.5].forEach((f,i)=>tone(f,i*0.11,0.3,'triangle',0.2)); }
function playChampion(){ [523.25,659.25,783.99,1046.5,1318.5,1567.98].forEach((f,i)=>tone(f,i*0.09,0.35,'triangle',0.22)); }
function playWrong(){
  const ctx=audioCtx(); const osc=ctx.createOscillator(); const lfo=ctx.createOscillator();
  const gain=ctx.createGain(); const lfoGain=ctx.createGain();
  osc.type='sawtooth'; osc.frequency.setValueAtTime(300, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(90, ctx.currentTime+0.5);
  lfo.frequency.setValueAtTime(28, ctx.currentTime); lfoGain.gain.setValueAtTime(18, ctx.currentTime);
  lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
  gain.gain.setValueAtTime(0.001, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime+0.03);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.55);
  osc.connect(gain).connect(ctx.destination);
  osc.start(); lfo.start(); osc.stop(ctx.currentTime+0.6); lfo.stop(ctx.currentTime+0.6);
}

============================================================ */
const flashRed = document.getElementById('flashRed');
const tip = document.getElementById('tipBubble');

function spawnParticles(colors, count, fromEl){
  if(!fromEl) return;
  const rect = fromEl.getBoundingClientRect();
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className='particle';
    const size = 5+Math.random()*7;
    p.style.width=size+'px'; p.style.height=size+'px';
    p.style.left=(rect.left+rect.width/2)+'px'; p.style.top=(rect.top+rect.height/2)+'px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    const angle = Math.random()*Math.PI*2;
    const dist = 50+Math.random()*80;
    const dx = Math.cos(angle)*dist, dy = Math.sin(angle)*dist;
    document.body.appendChild(p);
    p.animate([
      {transform:'translate(0,0) rotate(0deg)', opacity:1},
      {transform:`translate(${dx}px,${dy}px) rotate(${Math.random()*360}deg)`, opacity:0}
    ], {duration:600+Math.random()*300, easing:'ease-out'});
    setTimeout(()=>p.remove(), 950);
  }
}
function showTip(text, anchorEl){
  tip.textContent = text;
  const r = (anchorEl||document.body).getBoundingClientRect();
  let bx = r.left + r.width + 14, by = r.top - 50;
  if(bx+240 > window.innerWidth) bx = Math.max(8, window.innerWidth-250);
  if(by < 10) by = r.top + 50;
  tip.style.left = Math.max(8,bx)+'px';
  tip.style.top = Math.max(8,by)+'px';
  tip.classList.add('show');
  setTimeout(()=>tip.classList.remove('show'), 2800);
}

/* ============================================================
   HURDLE TRACK — obstacle course rendering + physics
============================================================ */
const OBSTACLE_KINDS = ['spike','block','ball','diamond','hex'];
const TRACK_COLORS   = ['#00e5ff','#ff2e97','#ffe600','#39ff14','#b026ff'];

function themeFor(idx){
  return { kind: OBSTACLE_KINDS[idx % OBSTACLE_KINDS.length], color: TRACK_COLORS[idx % TRACK_COLORS.length] };
}
function obstacleInner(kind, color){
  switch(kind){
    case 'spike':   return `<div style="width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;border-bottom:42px solid ${color};color:${color};"></div>`;
    case 'block':   return `<div style="width:38px;height:38px;background:${color};border-radius:6px;color:${color};"></div>`;
    case 'ball':    return `<div style="width:38px;height:38px;background:${color};border-radius:50%;color:${color};"></div>`;
    case 'diamond': return `<div style="width:32px;height:32px;background:${color};transform:rotate(45deg);color:${color};"></div>`;
    case 'hex':     return `<div style="width:38px;height:38px;background:${color};clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%,0 50%);color:${color};"></div>`;
  }
}
function trackMarkup(themeIdx, labelText){
  const t = themeFor(themeIdx);
  return `
    <div class="track-wrap" id="trackWrap" style="--accent:${t.color};">
      <div class="track-label">${labelText||''}</div>
      <div class="track-floor" style="background:${t.color};box-shadow:0 0 10px ${t.color};"></div>
      <div class="track-finish"></div>
      <div class="track-obstacle" id="trackObstacle">${obstacleInner(t.kind, t.color)}</div>
      <div class="track-cube" id="trackCube" style="background:linear-gradient(135deg, ${t.color}, #fff2); box-shadow:0 0 14px ${t.color}, inset 0 0 8px rgba(255,255,255,.4);"></div>
    </div>`;
}

function animateFrames(duration, frameFn){
  return new Promise(resolve=>{
    const start = performance.now();
    function step(now){
      const t = Math.min(1, (now-start)/duration);
      frameFn(t);
      if(t<1) requestAnimationFrame(step); else resolve();
    }
    requestAnimationFrame(step);
  });
}

/* Cube runs from start, leaps clean over the hurdle, lands past it. */
async function runAndClearHurdle(cubeEl){
  await animateFrames(850, t=>{
    const x = 6 + t*(90-6);
    const center=0.52, half=0.24;
    let bump=0;
    if(t>center-half && t<center+half){
      const local = (t-(center-half))/(2*half);
      bump = Math.sin(local*Math.PI);
    }
    const y = bump*52;
    const squash = 1 - bump*0.18;
    cubeEl.style.left = x+'%';
    cubeEl.style.transform = `translateY(-${y}px) scaleY(${squash}) rotate(${bump*18}deg)`;
  });
  cubeEl.style.transform = 'translateY(0) rotate(0deg)';
}

/* Cube runs toward the hurdle, crashes into it, and tumbles back to start. */
async function runAndCrash(cubeEl, obstacleEl){
  await animateFrames(600, t=>{
    const x = 6 + t*(49-6);
    cubeEl.style.left = x+'%';
    cubeEl.style.transform = `translateY(0) scaleY(${1+t*0.05}) rotate(0deg)`;
  });
  // impact
  spawnParticles(['#ff2e97','#ff5252','#ffe600'], 16, obstacleEl);
  document.body.classList.add('shake');
  flashRed.classList.add('show');
  setTimeout(()=>flashRed.classList.remove('show'), 150);
  setTimeout(()=>document.body.classList.remove('shake'), 400);
  await animateFrames(550, t=>{
    const x = 49 - t*(49-6);
    const rot = -t*320;
    const hop = Math.sin(t*Math.PI)*16;
    cubeEl.style.left = x+'%';
    cubeEl.style.transform = `translateY(-${hop}px) rotate(${rot}deg)`;
  });
  cubeEl.style.transform = 'translateY(0) rotate(0deg)';
}

function wireAnswerFlow(opts){
  const q = opts.q;
  const input = document.getElementById('answerInput');
  const submitBtn = document.getElementById('submitBtn');
  const cubeEl = document.getElementById('trackCube');
  const obstacleEl = document.getElementById('trackObstacle');
  input.focus();
  let busy = false;
  const submit = async ()=>{
    if(busy) return;
    const val = input.value.trim();
    if(!val) return;
    const norm = val.toLowerCase().replace(/[\s-]+/g,'');
    const correct = q.a.some(a=>a.toLowerCase().replace(/[\s-]+/g,'')===norm);
    const fb = document.getElementById('feedback');
    busy = true; input.disabled = true; submitBtn.disabled = true;
    if(correct){
      playSuccess();
      await runAndClearHurdle(cubeEl);
      spawnParticles(['#00e5ff','#ffe600','#39ff14'], 16, cubeEl);
      fb.textContent = '✅ Cleared the hurdle! New obstacle ahead...';
      fb.className = 'feedback good';
      setTimeout(()=> opts.onAdvance(), 500);
    } else {
      playWrong();
      await runAndCrash(cubeEl, obstacleEl);
      showTip(q.h, cubeEl);
      fb.textContent = '💥 Crashed into the hurdle! Back to the start — check the hint and try again.';
      fb.className = 'feedback bad';
      input.disabled = false; submitBtn.disabled = false;
      input.value=''; input.focus();
      busy = false;
    }
  };
  submitBtn.onclick = submit;
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit(); });
}

  spawnParticles(['#ffe600','#00e5ff','#ff2e97','#39ff14','#b026ff'], 30, document.getElementById('championBadge'));
  document.getElementById('saveScoreBtn').onclick = async ()=>{
    const name = document.getElementById('nameInput').value.trim() || 'Anonymous Dasher';
    try{
      const key = 'leaderboard:'+Date.now()+'-'+Math.floor(Math.random()*10000);
      await window.storage.set(key, JSON.stringify({name, time:elapsed, grade:state.grade}), true);
    }catch(e){ console.error('Could not save score', e); }
    loadLeaderboard();
  };
  document.getElementById('restartBtn').onclick = ()=>{
    state = {grade:null, levelIdx:0, qList:[], qIdx:0, earnedBadges:[], startTime:null, bossDoors:[], bossOpen:[false,false,false,false,false], trackCounter:0};
    renderBadgeTray();
    screenGradeSelect();
  };
  loadLeaderboard();
}

async function loadLeaderboard(){
  const wrap = document.getElementById('lbWrap');
  if(!wrap) return;
  wrap.innerHTML = `<p class="level-desc" style="text-align:center;">Loading leaderboard…</p>`;
  try{
    const list = await window.storage.list('leaderboard:', true);
    if(!list || !list.keys || list.keys.length===0){
      wrap.innerHTML = `<p class="level-desc" style="text-align:center;">No scores yet — be the first Champion!</p>`;
      return;
    }
    const entries = [];
    for(const k of list.keys){
      try{
        const res = await window.storage.get(k, true);
        if(res && res.value){ entries.push(JSON.parse(res.value)); }
      }catch(e){ /* skip unreadable entry */ }
    }
    entries.sort((a,b)=>a.time-b.time);
    const top = entries.slice(0,10);
    const medals = ['🥇','🥈','🥉'];
    wrap.innerHTML = `<div class="leaderboard">${top.map((e,i)=>`
      <div class="lb-row">
        <div class="lb-rank">${medals[i]||(i+1)}</div>
        <div class="lb-name">${(e.name||'Anonymous').slice(0,24)}</div>
        <div class="lb-time">${e.time}s · G${e.grade||'?'}</div>
      </div>`).join('')}</div>`;
  }catch(e){
    wrap.innerHTML = `<p class="level-desc" style="text-align:center;">Leaderboard unavailable right now.</p>`;
  }
}

/* ============================================================
   INIT
============================================================ */
renderBadgeTray();
screenGradeSelect();
</script>
